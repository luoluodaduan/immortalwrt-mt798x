name: Build Firmware AX6000 

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang clangd cmake /
          cpio curl device-tree-compiler dos2unix ecj fakeroot fastjar flex g++-multilib gawk gcc-multilib genisoimage gettext git gnutls-dev gperf /
          haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev /
          libncurses-dev libncurses5-dev libncursesw5 libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld lldb /
          llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-cryptography python3-docutils python3-pip /
          python3-ply python3-pyelftools qemu-utils quilt re2c rsync scons sharutils squashfs-tools subversion swig texinfo uglifyjs unzip upx-ucl vim /
          wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -yqq autoremove
          sudo -E apt-get -yqq autoclean
          sudo -E apt-get -yqq clean
          sudo -E systemctl daemon-reload

      - name: Prepare
        run: |
          git clone --depth=1 https://github.com/hanwckf/immortalwrt-mt798x.git
          cp -rf fix/* immortalwrt-mt798x
          ./immortalwrt-mt798x/scripts/feeds update -a
          ./immortalwrt-mt798x/scripts/feeds install -a
          ./immortalwrt-mt798x/scripts/feeds install -a
          cp -f defconfig/mt7986-ax6000.config immortalwrt-mt798x/.config
 
      - name: Build
        run: |
          cd immortalwrt-mt798x
          make defconfig
          make -j$(nproc) V=s
          rm -rf bin/packages
          rm -rf bin/targets/mediatek/mt7986/packages

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Redmi_AX6000
          path: immortalwrt-mt798x/bin/targets/mediatek/mt7986/

      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 1
          gh_token: ${{secrets.GITHUB_TOKEN}}
